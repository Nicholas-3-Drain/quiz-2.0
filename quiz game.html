<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test You</title>
    <link rel="stylesheet" href="quiz game.css">
    <link rel="shortcut icon" href="photo/test-removebg-preview.png" type="image/x-icon">
</head>
<body>
 <div class="container">   
    <!--First screen-->
    <div class="screen active" id="start-screen">
        <h1>Quiz For Today!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
    </div>

    <!--Second screen-->
    <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question-text">Question goes here</h2>
        </div>

        <div class="quiz-info">
            <p>Question <span id="current-question">1</span> of <span
            id="total-questions">5</span></p>
            <p>Score: <span id="score">0</span></p>
        </div>

        <div id="answers-container" class="answer-container">
            <!--Answers will be inserted from JS later-->
        </div> 

        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
    </div>

    <!--Results screen-->
    <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
            <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
            <div id="result-message">Good job!</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
    </div>
</div>
<script src="quiz game.js"></script>
</body>
</html>
